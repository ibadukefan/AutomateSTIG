name: CI

on:
  push:
    branches: ["**"]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

permissions:
  contents: read

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --all-targets

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  frontend-syntax:
    name: Frontend syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node --check crates/gui/frontend/app.js

  coverage-validation:
    name: Coverage manifest validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo run -p automatestig -- coverage validate --manifest content/coverage/windows_server_2022.example.json
      - run: cargo run -p automatestig -- coverage validate --manifest content/coverage/rhel8.example.json
      - run: cargo run -p automatestig -- coverage validate --manifest content/coverage/windows_server_2022.full.json
      - run: cargo run -p automatestig -- coverage validate --manifest content/coverage/rhel8.full.json
      - run: python3 scripts/validate-authorized-fixtures.py fixtures/authorized/manifest.example.json --repo-root .

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit
      # RUSTSEC-2023-0071 is documented in docs/audit-exceptions.md. Keep the
      # exception explicit so all other vulnerabilities fail CI.
      - run: cargo audit --ignore RUSTSEC-2023-0071

  build-release:
    name: Build Release
    needs: [check, test, fmt, clippy, frontend-syntax, coverage-validation, dependency-audit]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: automatestig
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: automatestig.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: automatestig
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --bin automatestig
      - name: Generate SBOM and provenance scaffold
        shell: bash
        run: |
          mkdir -p target/release/provenance
          cargo metadata --locked --format-version 1 > target/release/provenance/cargo-metadata-${{ matrix.target }}.json
          cat > target/release/provenance/provenance-${{ matrix.target }}.json <<EOF
          {
            "artifact": "${{ matrix.artifact }}",
            "target": "${{ matrix.target }}",
            "repository": "${{ github.repository }}",
            "ref": "${{ github.ref }}",
            "sha": "${{ github.sha }}",
            "workflow": "${{ github.workflow }}",
            "run_id": "${{ github.run_id }}",
            "run_attempt": "${{ github.run_attempt }}"
          }
          EOF
      - name: Generate SHA-256 checksum
        shell: bash
        run: |
          cd target/release
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${{ matrix.artifact }}" > "${{ matrix.artifact }}.sha256"
          else
            shasum -a 256 "${{ matrix.artifact }}" > "${{ matrix.artifact }}.sha256"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: automatestig-${{ matrix.target }}
          path: |
            target/release/${{ matrix.artifact }}
            target/release/${{ matrix.artifact }}.sha256
            target/release/provenance/cargo-metadata-${{ matrix.target }}.json
            target/release/provenance/provenance-${{ matrix.target }}.json
          retention-days: 14
          if-no-files-found: error
