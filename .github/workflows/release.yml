name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: taiki-e/create-gh-release-action@v1
        with:
          ref: ${{ github.event.inputs.tag && format('refs/tags/{0}', github.event.inputs.tag) || github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

  release:
    name: ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: automatestig,automatestig-gui
          target: ${{ matrix.target }}
          archive: automatestig-$tag-$target
          checksum: sha256
          include: README.md,LICENSE,docs/quickstart.md,docs/installation.md
          tar: unix
          zip: windows
          ref: ${{ github.event.inputs.tag && format('refs/tags/{0}', github.event.inputs.tag) || github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set release tag
        shell: bash
        run: echo "TAG=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_ENV"
      - name: Build and upload macOS DMG
        if: contains(matrix.target, 'apple-darwin')
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x packaging/macos/build-app.sh packaging/macos/build-dmg.sh
          ARCH=x86_64
          if [[ "${{ matrix.target }}" == *aarch64* ]]; then
            ARCH=arm64
          fi
          packaging/macos/build-app.sh "target/${{ matrix.target }}/release/automatestig-gui" "$TAG" .
          packaging/macos/build-dmg.sh AutomateSTIG.app "$TAG" "$ARCH" .
          gh release upload "$TAG" "AutomateSTIG-$TAG-macos-$ARCH.dmg" --clobber
      - name: Build and upload Windows setup
        if: matrix.target == 'x86_64-pc-windows-msvc'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          choco install nsis -y --no-progress
          Copy-Item "target/x86_64-pc-windows-msvc/release/automatestig.exe" "packaging/windows/automatestig.exe" -Force
          Copy-Item "target/x86_64-pc-windows-msvc/release/automatestig-gui.exe" "packaging/windows/automatestig-gui.exe" -Force
          Copy-Item "packaging/icon/AutomateSTIG.ico" "packaging/windows/AutomateSTIG.ico" -Force
          $makensis = Join-Path "${env:ProgramFiles(x86)}" "NSIS\makensis.exe"
          if (-not (Test-Path $makensis)) {
            $makensis = "C:\Program Files\NSIS\makensis.exe"
          }
          $nsi = (Resolve-Path "packaging/windows/installer.nsi").Path
          & $makensis "/DVERSION=${env:TAG}" $nsi
          $setup = "AutomateSTIG-${env:TAG}-windows-x64-setup.exe"
          if (-not (Test-Path $setup)) {
            Copy-Item "packaging/windows/$setup" $setup -Force
          }
          gh release upload "${env:TAG}" $setup --clobber
      - name: Build and upload Linux AppImage
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x packaging/linux/build-appimage.sh
          packaging/linux/build-appimage.sh "target/${{ matrix.target }}/release" "$TAG" x86_64 .
          gh release upload "$TAG" "AutomateSTIG-$TAG-linux-x86_64.AppImage" --clobber
      - name: Generate and upload SBOM
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cargo metadata --locked --format-version 1 > cargo-metadata.json
          python3 scripts/generate-cyclonedx-sbom.py \
            --metadata cargo-metadata.json \
            --output "automatestig-$TAG-sbom.cdx.json" \
            --target x86_64-unknown-linux-gnu
          gh release upload "$TAG" "automatestig-$TAG-sbom.cdx.json" --clobber
