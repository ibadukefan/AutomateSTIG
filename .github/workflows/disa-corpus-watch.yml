name: DISA Corpus Watch

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  corpus-watch:
    name: DISA corpus freshness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 scripts/disa_corpus/index_disa_downloads.py --output /tmp/disa-download-index.json
      - run: python3 scripts/disa_corpus/compare_corpus_freshness.py --baseline content/disa-corpus/download-index.json --current /tmp/disa-download-index.json --allow-new
      - name: Upload fresh index
        uses: actions/upload-artifact@v4
        with:
          name: disa-download-index
          path: /tmp/disa-download-index.json
          if-no-files-found: error
