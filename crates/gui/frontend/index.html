<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutomateSTIG</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Sidebar -->
    <nav id="sidebar">
      <div class="sidebar-brand">
        <span class="brand-text">Automate<span class="accent">STIG</span></span>
        <span class="brand-version" id="app-version">v0.1.0</span>
      </div>
      <div class="sidebar-nav">
        <a href="#" class="nav-item active" data-page="assessments">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
          <span>Assessments</span>
        </a>
        <a href="#" class="nav-item" data-page="assets">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/><circle cx="6" cy="6" r="1"/><circle cx="6" cy="18" r="1"/></svg>
          <span>Assets</span>
        </a>
        <a href="#" class="nav-item" data-page="standards">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
          <span>Standards</span>
        </a>
        <a href="#" class="nav-item" data-page="findings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          <span>Findings</span>
        </a>
        <a href="#" class="nav-item" data-page="settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
          <span>Settings</span>
        </a>
      </div>
      <div class="sidebar-footer">
        <div class="sidebar-status" id="connection-status">
          <span class="status-dot" id="status-dot"></span>
          <span id="status-text">Connected</span>
        </div>
        <button class="theme-toggle" onclick="toggleTheme()">Toggle Theme</button>
        <div class="sidebar-caption">
          Made in the United States,<br>in the Commonwealth of Virginia.
        </div>
      </div>
    </nav>

    <!-- Main content -->
    <main id="main">
      <div id="page-assessments" class="page active"></div>
      <div id="page-checklists" class="page"></div>
      <div id="page-assets" class="page"></div>
      <div id="page-standards" class="page"></div>
      <div id="page-findings" class="page"></div>
      <div id="page-settings" class="page"></div>
    </main>
  </div>

  <!-- Toast notification container -->
  <div id="toasts"></div>

  <script src="app.js"></script>
</body>
</html>
